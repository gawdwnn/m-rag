services:
  es01:
    image: elasticsearch:${STACK_VERSION:-8.11.3}
    container_name: m-ragflow-es01
    env_file:
      - ../.env
    environment:
      - node.name=es01
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-infini_m_ragflow}
      - bootstrap.memory_lock=false
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - cluster.routing.allocation.disk.watermark.low=5gb
      - cluster.routing.allocation.disk.watermark.high=3gb
      - cluster.routing.allocation.disk.watermark.flood_stage=2gb
    mem_limit: ${MEM_LIMIT:-2147483648}
    ports:
      - "${ES_PORT:-1202}:9200"
    volumes:
      - mragflow_es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -u elastic:$${ELASTIC_PASSWORD} http://localhost:9200 >/dev/null"]
      interval: 10s
      timeout: 10s
      retries: 120

  mysql:
    image: ${M_RAGFLOW_MYSQL_IMAGE:-mysql:8.4}
    container_name: ${M_RAGFLOW_MYSQL_CONTAINER:-m-ragflow-mysql}
    env_file:
      - ../.env
    environment:
      MYSQL_DATABASE: ${M_RAGFLOW_DB_NAME:-m_ragflow}
      MYSQL_USER: ${M_RAGFLOW_DB_USER:-m_ragflow}
      MYSQL_PASSWORD: ${M_RAGFLOW_DB_PASSWORD:-m_ragflow}
      MYSQL_ROOT_PASSWORD: ${M_RAGFLOW_DB_ROOT_PASSWORD:-m_ragflow_root}
    ports:
      - "${M_RAGFLOW_DB_PORT:-3307}:3306"
    volumes:
      - mragflow_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 10s
      retries: 120

  minio:
    image: ${M_RAGFLOW_MINIO_IMAGE:-minio/minio:RELEASE.2025-04-22T22-12-26Z}
    container_name: ${M_RAGFLOW_MINIO_CONTAINER:-m-ragflow-minio}
    env_file:
      - ../.env
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${M_RAGFLOW_MINIO_ACCESS_KEY:-m_ragflow}
      MINIO_ROOT_PASSWORD: ${M_RAGFLOW_MINIO_SECRET_KEY:-m_ragflow_secret}
    ports:
      - "${M_RAGFLOW_MINIO_PORT:-9002}:9000"
      - "${M_RAGFLOW_MINIO_CONSOLE_PORT:-9003}:9001"
    volumes:
      - mragflow_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 10s
      retries: 120

  redis:
    image: ${M_RAGFLOW_REDIS_IMAGE:-redis:7.2-alpine}
    container_name: ${M_RAGFLOW_REDIS_CONTAINER:-m-ragflow-redis}
    env_file:
      - ../.env
    command: ["redis-server", "--requirepass", "${M_RAGFLOW_REDIS_PASSWORD:-m_ragflow_redis}", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${M_RAGFLOW_REDIS_PORT:-6381}:6379"
    volumes:
      - mragflow_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${M_RAGFLOW_REDIS_PASSWORD:-m_ragflow_redis}", "ping"]
      interval: 10s
      timeout: 10s
      retries: 120

volumes:
  mragflow_es_data:
  mragflow_mysql_data:
  mragflow_minio_data:
  mragflow_redis_data:
