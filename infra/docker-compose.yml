services:
  es01:
    image: elasticsearch:${STACK_VERSION:-8.11.3}
    container_name: rag-es01
    env_file:
      - ../.env
    environment:
      - node.name=es01
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-infini_rag}
      - bootstrap.memory_lock=false
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - cluster.routing.allocation.disk.watermark.low=5gb
      - cluster.routing.allocation.disk.watermark.high=3gb
      - cluster.routing.allocation.disk.watermark.flood_stage=2gb
    mem_limit: ${MEM_LIMIT:-2147483648}
    ports:
      - "${ES_PORT:-1202}:9200"
    volumes:
      - rag_es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -u elastic:$${ELASTIC_PASSWORD} http://localhost:9200 >/dev/null"]
      interval: 10s
      timeout: 10s
      retries: 120

  mysql:
    image: ${RAG_MYSQL_IMAGE:-mysql:8.4}
    container_name: ${RAG_MYSQL_CONTAINER:-rag-mysql}
    env_file:
      - ../.env
    environment:
      MYSQL_DATABASE: ${RAG_DB_NAME:-rag}
      MYSQL_USER: ${RAG_DB_USER:-rag}
      MYSQL_PASSWORD: ${RAG_DB_PASSWORD:-rag}
      MYSQL_ROOT_PASSWORD: ${RAG_DB_ROOT_PASSWORD:-rag_root}
    ports:
      - "${RAG_DB_PORT:-3307}:3306"
    volumes:
      - rag_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 10s
      retries: 120

  minio:
    image: ${RAG_MINIO_IMAGE:-minio/minio:RELEASE.2025-04-22T22-12-26Z}
    container_name: ${RAG_MINIO_CONTAINER:-rag-minio}
    env_file:
      - ../.env
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${RAG_MINIO_ACCESS_KEY:-rag}
      MINIO_ROOT_PASSWORD: ${RAG_MINIO_SECRET_KEY:-rag_secret}
    ports:
      - "${RAG_MINIO_PORT:-9002}:9000"
      - "${RAG_MINIO_CONSOLE_PORT:-9003}:9001"
    volumes:
      - rag_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 10s
      retries: 120

  redis:
    image: ${RAG_REDIS_IMAGE:-redis:7.2-alpine}
    container_name: ${RAG_REDIS_CONTAINER:-rag-redis}
    env_file:
      - ../.env
    command: ["redis-server", "--requirepass", "${RAG_REDIS_PASSWORD:-rag_redis}", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${RAG_REDIS_PORT:-6381}:6379"
    volumes:
      - rag_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${RAG_REDIS_PASSWORD:-rag_redis}", "ping"]
      interval: 10s
      timeout: 10s
      retries: 120

volumes:
  rag_es_data:
  rag_mysql_data:
  rag_minio_data:
  rag_redis_data:
